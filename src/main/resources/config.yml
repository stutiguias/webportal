configversion: 3
#Use SQLite or MYSQL
DataBase:
  # You need to choose if you will use SQLite or Mysql ( default is SQLite )
  Type: SQLite
#MySQL config if you will use mysql ( set type to mysql )
MySQL:
  Host: localhost
  Username: root
  Password: change_this
  Port: '3306'
  Database: minecraft
  
Misc:
  # Report the sale in game if web sell something
  ReportSales: false
  # Show the sales that player have on player join
  ShowSalesOnJoin: false
  #If the player not Online on the Server the login will fail
  AllowLogOnlyIfOnline: false
  # if you want to use External WebServer
  EnableExternalSource: false
  # Put the ip/url address of your host ( external source ) where you put the html folder 
  # ( or * to allow all sources NOT RECOMMENDED )
  Allow: http://yourwebsite.com
  # Port number for webserver 
  # Check if your host not will block that port
  # Check if your server is not behind firewall
  WebServicePort: 25900
  # WebService now always uses HTTPS.
  # Plain HTTP is no longer available.
  # Use a valid PKCS12 certificate (*.p12 or *.pfx)
  # Relative paths are resolved from plugins/Webportal
  # For a trusted browser connection, the certificate must match the host
  # you open in the browser and be issued by a trusted CA.
  # if you change this need to restart the server ( not reload )
  SSLCertificatePath: myserver.p12
  SSLCertificatePassword: 'change_this'
  # Delay for don't allow spam on sign
  SignDelay: 1000
  # Mailbox delay for spam on mailbox and item don't disappear
  MailboxDelay: 10000
  # Max Simultaneous Connection the Server Can Hold !
  # This base on WebSite Request
  MaxSimultaneousConnection: 500
  # Limit how many web requests are processed in parallel.
  # Keep this low because the web server runs inside Minecraft.
  WebServerWorkerThreads: 4
  # Extra accepted requests waiting for a free worker before new requests
  # start receiving 503 Service Unavailable.
  WebServerQueueLimit: 8
  # Check this if you don't allow player use sign
  # on creative mode on
  BlockCreative: true
  # Use OnJoinCheckPermission permission will overwrite the permission 
  # you set or alter by command /wa set <player> <option> <yes/no>
  OnJoinCheckPermission: false
  # Allow MetaItem Sell
  # if you use 
  # RPG ITEM 2 turn on
  AllowMetaItem: false
  # Time in hours for item expiration (0 to disable)
  # Expired items are automatically returned to player's mailbox
  # Default: 168 hours (7 days)
  ItemExpiryHours: 168
  # Setup your language file xxx.yml on plugins/Webportal folder
  Language: 'eng'
  
Updates:
  # Frequency alert will be send 
  # Only if you Set  ReportSales to true
  SaleAlertFrequency: 30  
